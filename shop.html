 <script>document.getElementById('productForm').addEventListener('submit', function (event) {
    event.preventDefault();

    const productName = document.getElementById('productName').value;
    const productImageFile = document.getElementById('productImage').files[0];
    const productDescription = document.getElementById('productDescription').value;
    const productPrice = document.getElementById('productPrice').value;
    const whatsappLink = document.getElementById('whatsappLink').value;

    // Check if an image is selected
    if (!productImageFile) {
        alert("Please select an image.");
        return;
    }

    // Create a product object
    const timestamp = new Date();
    const product = {
        name: productName,
        image: URL.createObjectURL(productImageFile),
        description: productDescription,
        price: productPrice,
        whatsapp: whatsappLink,
        time: timestamp
    };

    console.log("Product Created:", product); // Log product for debugging

    // Add the product to the list
    addProductToList(product);

    // Reset the form
    document.getElementById('productForm').reset();
});

async function addProductToList(product) {
    const productList = document.getElementById('productList');
    const template = document.getElementById('productTemplate').content.cloneNode(true);

    template.getElementById('productNameHeader').textContent = product.name;
    template.getElementById('productImage').src = product.image; // Check this line
    template.getElementById('productDescriptionText').textContent = product.description;
    template.getElementById('productPriceText').textContent = `Tshs ${product.price}`;
    template.getElementById('productWhatsapp').href = `https://wa.me/${product.whatsapp}`;

    const productTimeElement = template.getElementById('productTime');
    productTimeElement.textContent = getTimeAgo(product.time);

    productList.appendChild(template);

    // Start the interval for real-time updates
    setInterval(() => {
        productTimeElement.textContent = getTimeAgo(product.time);
    }, 1000);
}

function getTimeAgo(timestamp) {
    const now = Math.floor(Date.now() / 1000);
    const seconds = Math.floor((now - Math.floor(timestamp / 1000)));

    if (seconds < 60) return seconds + "s";
    if (seconds < 3600) return Math.floor(seconds / 60) + "m";
    return Math.floor(seconds / 3600) + "h";
}

<script>const toggleBtn = document.querySelector('.toggle-btn');const sidebar = document.querySelector('.sidebar');toggleBtn.addEventListener('click', () => {sidebar.classList.toggle('open');});</script>
<script>const heartIcons = document.querySelectorAll('.like'); heartIcons.forEach(heart => {heart.addEventListener('click', function(event) { event.preventDefault(); const icon = heart.querySelector('i');if (icon.classList.contains('ri-heart-3-line')) { icon.classList.remove('ri-heart-3-line'); icon.classList.add('ri-heart-3-fill'); heart.classList.add('liked'); } else {icon.classList.remove('ri-heart-3-fill'); icon.classList.add('ri-heart-3-line');heart.classList.remove('liked');}});});</script>
<script>let isProcessing = false; let toastTimeout; function showToast(message) {var toast = document.getElementById('toast');toast.textContent = message; toast.className = 'toast show';clearTimeout(toastTimeout); toastTimeout = setTimeout(function() {  toast.className = toast.className.replace('show', '');  }, 3000);}document.querySelectorAll('.active').forEach(function(element) {element.addEventListener('click', function() { if (isProcessing) return;isProcessing = true;  setTimeout(() => {  if (this.classList.contains('follow')) { this.classList.remove('follow'); this.classList.add('following'); this.textContent = 'Following'; showToast('Mtaa Followed');  } else { this.classList.remove('following');this.classList.add('follow');  this.textContent = 'Follow'; showToast('Mtaa Unfollowed'); }isProcessing = false;}, 100);});});</script>
<script>var modals = document.querySelectorAll('.modal');var openModalButtons = document.querySelectorAll('[id^="openModalButton"]'); var closeButtons = document.querySelectorAll('.close');function showModal(modal) {modal.classList.add("show");}function closeModal(modal) { modal.classList.remove("show");}openModalButtons.forEach(button => {button.onclick = function() {var modalId = this.id.replace('openModalButton', 'modal');var modal = document.getElementById(modalId);showModal(modal);};});closeButtons.forEach(button => {button.onclick = function() {var modal = this.closest('.modal');closeModal(modal);};});window.onclick = function(event) {modals.forEach(modal => {if (event.target === modal) {closeModal(modal);}});}</script>
