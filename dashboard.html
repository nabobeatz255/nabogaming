<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Like Post</title>
  <link rel="stylesheet" href="app.css"><link rel="stylesheet" href="2.css">
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #app {
      width: 600px;
      margin: auto;
    }

    .instagram-post {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
    }

    .instagram-post img {
      max-width: 100%;
      height: auto;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .post-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .post-options {
      margin-left: auto;
    }

    .post-options i {
      cursor: pointer;
    }

    .post-image img {
      max-width: 100%;
      height: auto;
    }

    .bottom-left-icon {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: white;
      font-size: 12px;
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .actions-left i, .actions-right i {
      cursor: pointer;
      margin-right: 10px;
    }

    .like-counter {
      margin-top: 5px;
    }

    .caption {
      margin-top: 10px;
      font-size: 14px;
    }

    .username {
      font-weight: bold;
    }

    .post-comments {
      margin-top: 10px;
    }

    .toggle-comments {
      background: none;
      border: none;
      cursor: pointer;
      color: #007bff;
    }

    .comment-input-container {
      display: flex;
      margin-top: 10px;
    }

    .comment-input {
      width: 100%;
      padding: 5px;
      margin-right: 5px;
    }

    .submit-comment {
      padding: 5px 10px;
      cursor: pointer;
    }

    /* Style for the new post form */
    .new-post-form {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
    }

    .new-post-form input,
    .new-post-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .new-post-form button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .new-post-form button:hover {
      background-color: #45a049;
    }

  </style>
</head>
<body>
  <div id="app">
    <!-- New Post Form -->
    <div class="new-post-form">
      <h3>Create a New Post</h3>
      <textarea id="new-post-caption" placeholder="Write your caption..."></textarea>
      <input type="file" id="new-post-image" accept="image/*">
      <button id="create-post-btn">Post</button>
    </div>

    <!-- Posts Container -->
    <div id="posts-container"></div>
  </div>

  <script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getDatabase, ref, push, update, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_VKdV-KsIzUiOb7jFLsYXdTsuGkLiS-Q",
  authDomain: "register-71bde.firebaseapp.com",
  projectId: "register-71bde",
  storageBucket: "register-71bde.appspot.com",
  messagingSenderId: "412548441298",
  appId: "1:412548441298:web:e0fb2b6c5fbd4af7d0b90b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase(app);
const storage = getStorage(app);

const postsContainer = document.getElementById("posts-container");

// Format timestamp for displaying
const formatTimestamp = (timestamp) => {
  const date = new Date(timestamp);
  return date.toLocaleString();
};

// Load posts from the database
const loadPosts = () => {
  const postsRef = ref(db, "posts");
  onValue(postsRef, (snapshot) => {
    postsContainer.innerHTML = "";
    snapshot.forEach((childSnapshot) => {
      const postId = childSnapshot.key;
      const post = childSnapshot.val();
      displayPost(postId, post);
    });
  });
};

// Display each post
const displayPost = (postId, post) => {
  const postElement = document.createElement("div");
  postElement.className = "instagram-post";
  postElement.innerHTML = `
    <div class="post-header">
      <div class="profile-picture">
        <img src="${post.authorPhoto}" alt="User profile picture">
      </div>
      <div class="profile-details">
        <div class="profile-name">
          ${post.authorName}
        </div>
        <div class="post-time">
          ${formatTimestamp(post.timestamp)}
        </div>
      </div>
    </div>
    <div class="post-image">
      <img src="${post.imageUrl}" alt="Post content">
    </div>
    <div class="like-counter">
      <span>${Object.keys(post.likes || {}).length} likes</span>&nbsp;|&nbsp;<span>999k comments</span>
    </div>
    <div class="caption">
      <span class="username">${post.authorName}</span> ${post.content}
    </div>
  `;
  postsContainer.appendChild(postElement);
};

// Create a new post with caption and image
const createNewPost = async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Please log in to post.");
    return;
  }

  const caption = document.getElementById("new-post-caption").value;
  const fileInput = document.getElementById("new-post-image");
  const file = fileInput.files[0];

  if (!caption && !file) {
    alert("Please provide a caption or an image.");
    return;
  }

  try {
    let imageUrl = "";

    if (file) {
      // Upload image to Firebase Storage
      const storageReference = storageRef(storage, `post_images/${user.uid}/${file.name}`);
      const uploadTask = uploadBytes(storageReference, file);
      
      const snapshot = await uploadTask;
      imageUrl = await getDownloadURL(snapshot.ref);
    }

    // Save post to Firebase Realtime Database
    const newPostRef = push(ref(db, "posts"));
    await set(newPostRef, {
      authorName: user.displayName || "Anonymous",
      authorPhoto: user.photoURL || "default-profile.png",
      content: caption,
      imageUrl: imageUrl,
      timestamp: serverTimestamp(),
      likes: {},  // Initially, no likes
      comments: {},  // Initially, no comments
    });

    alert("Post created successfully!");
    document.getElementById("new-post-caption").value = "";
    fileInput.value = "";
    loadPosts();
  } catch (error) {
    console.error("Error creating post:", error);
    alert("Failed to create post.");
  }
};

// Event listener for creating a post
document.getElementById("create-post-btn").addEventListener("click", createNewPost);

// Monitor authentication state
onAuthStateChanged(auth, (user) => {
  if (user) {
    loadPosts();
  } else {
    alert("Please log in to view posts.");
  }
});</script>
</body>
</html>
