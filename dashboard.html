<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Like Post</title>
<style>
    body {
  font-family: Arial, sans-serif;
}

#app {
  width: 600px;
  margin: auto;
}

.post {
  border: 1px solid #ddd;
  padding: 10px;
  margin: 10px 0;
}

.post img {
  max-width: 100%;
  height: auto;
}

button {
  margin: 5px;
  padding: 5px 10px;
  cursor: pointer;
}

.comment-section {
  margin-top: 10px;
}

.comment {
  margin: 5px 0;
  padding-left: 10px;
  border-left: 2px solid #ddd;
}
</style>
</head>
<body>
  <div id="app">
    <div id="create-post">
      <input type="text" id="post-content" placeholder="Write your post...">
      <input type="file" id="post-image">
      <button id="create-post-btn">Create Post</button>
    </div>

    <div id="posts-container"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getDatabase, ref, push, update, onValue, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_VKdV-KsIzUiOb7jFLsYXdTsuGkLiS-Q",
      authDomain: "register-71bde.firebaseapp.com",
      projectId: "register-71bde",
      storageBucket: "register-71bde.appspot.com",
      messagingSenderId: "412548441298",
      appId: "1:412548441298:web:e0fb2b6c5fbd4af7d0b90b",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase(app);
    const storage = getStorage(app);

    const postsContainer = document.getElementById("posts-container");
    const createPostBtn = document.getElementById("create-post-btn");
    const postContentInput = document.getElementById("post-content");
    const postImageInput = document.getElementById("post-image");

    // Function to create a post
    const createPost = async () => {
      const user = auth.currentUser;
      if (!user) {
        alert("Please sign in to create a post.");
        return;
      }

      const content = postContentInput.value;
      const imageFile = postImageInput.files[0];
      let imageUrl = "";

      if (imageFile) {
        const imageStorageRef = storageRef(storage, `post_images/${Date.now()}_${imageFile.name}`);
        const snapshot = await uploadBytes(imageStorageRef, imageFile);
        imageUrl = await getDownloadURL(snapshot.ref);
      }

      const postRef = push(ref(db, "posts"));
      await update(postRef, {
        authorId: user.uid,
        content,
        imageUrl,
        timestamp: serverTimestamp(),
        likes: {},
        shares: {},
        comments: {},
      });

      postContentInput.value = "";
      postImageInput.value = "";
      alert("Post created!");
    };

    // Function to load posts
    const loadPosts = () => {
      const postsRef = ref(db, "posts");
      onValue(postsRef, (snapshot) => {
        postsContainer.innerHTML = "";
        snapshot.forEach((childSnapshot) => {
          const postId = childSnapshot.key;
          const post = childSnapshot.val();
          displayPost(postId, post);
        });
      });
    };

    // Function to display a post
    const displayPost = (postId, post) => {
      const postElement = document.createElement("div");
      postElement.className = "post";
      postElement.innerHTML = `
        <p>${post.content}</p>
        ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Post Image">` : ""}
        <div>
          <button class="like-btn" data-id="${postId}">Like (${Object.keys(post.likes || {}).length})</button>
          <button class="share-btn" data-id="${postId}">Share (${Object.keys(post.shares || {}).length})</button>
        </div>
        <div class="comment-section">
          <input type="text" class="comment-input" placeholder="Add a comment...">
          <button class="comment-btn" data-id="${postId}">Comment</button>
          <div class="comments-container">
            ${Object.values(post.comments || {}).map(comment => `<p class="comment"><strong>${comment.authorName}:</strong> ${comment.text}</p>`).join('')}
          </div>
        </div>
      `;

      postsContainer.appendChild(postElement);

      // Like button functionality
      postElement.querySelector(".like-btn").addEventListener("click", () => likePost(postId));
      // Share button functionality
      postElement.querySelector(".share-btn").addEventListener("click", () => sharePost(postId));
      // Comment button functionality
      postElement.querySelector(".comment-btn").addEventListener("click", (e) => addComment(postId, e));
    };

    // Function to like a post
    const likePost = async (postId) => {
      const user = auth.currentUser;
      if (!user) return;

      const postRef = ref(db, `posts/${postId}/likes/${user.uid}`);
      const likeSnapshot = await postRef.get();
      
      if (!likeSnapshot.exists()) {
        await update(postRef, true);  // User can like the post once
      }
    };

    // Function to share a post
    const sharePost = async (postId) => {
      const user = auth.currentUser;
      if (!user) return;

      const postRef = ref(db, `posts/${postId}`);
      const postSnapshot = await postRef.get();
      const post = postSnapshot.val();
      const postLink = `${window.location.origin}/post/${postId}`;

      const shareData = {
        title: post.content,
        text: `Check out this post by ${user.displayName}: ${post.content}`,
        url: postLink,
      };

      try {
        navigator.clipboard.writeText(postLink); // Copy the link to clipboard
        alert("Post link copied to clipboard!");

        if (navigator.share) {
          await navigator.share(shareData);
        }
      } catch (err) {
        alert("Failed to share the post.");
        console.error("Error sharing post: ", err);
      }
    };

    // Function to add a comment
    const addComment = async (postId, event) => {
      const user = auth.currentUser;
      if (!user) return;

      const commentInput = event.target.previousElementSibling;
      const commentText = commentInput.value.trim();
      if (!commentText) return;

      const commentRef = push(ref(db, `posts/${postId}/comments`));
      await update(commentRef, {
        authorName: user.displayName || "Anonymous",
        text: commentText,
        timestamp: serverTimestamp(),
      });

      commentInput.value = "";
    };

    // Event Listeners
    createPostBtn.addEventListener("click", createPost);

    // Monitor auth state and load posts
    onAuthStateChanged(auth, (user) => {
      if (user) {
        loadPosts();
      } else {
        alert("Please log in to view posts.");
      }
    });
  </script>
</body>
</html>
