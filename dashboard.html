<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Like Post</title>
  <link rel="stylesheet" href="app.css"><link rel="stylesheet" href="2.css">
</head>
<body>
  <div id="app">
    <!-- New Post Form -->
    <div class="new-post-form">
      <h3>Create a New Post</h3>
      <textarea id="new-post-caption" placeholder="Write your caption..."></textarea>
      <input type="file" id="new-post-image" accept="image/*">
      <button id="create-post-btn">Post</button>
    </div>

    <!-- Posts Container -->
    <div id="posts-container" class="post-grid"></div>
  </div>

  <script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getDatabase, ref, push, update, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_VKdV-KsIzUiOb7jFLsYXdTsuGkLiS-Q",
  authDomain: "register-71bde.firebaseapp.com",
  projectId: "register-71bde",
  storageBucket: "register-71bde.appspot.com",
  messagingSenderId: "412548441298",
  appId: "1:412548441298:web:e0fb2b6c5fbd4af7d0b90b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase(app);
const storage = getStorage(app);

const postsContainer = document.getElementById("posts-container");

// Format timestamp for displaying
const formatTimestamp = (timestamp) => {
  const date = new Date(timestamp);
  return date.toLocaleString();
};

// Load posts from the database
const loadPosts = () => {
  const postsRef = ref(db, "posts");
  onValue(postsRef, (snapshot) => {
    postsContainer.innerHTML = "";
    snapshot.forEach((childSnapshot) => {
      const postId = childSnapshot.key;
      const post = childSnapshot.val();
      displayPost(postId, post);
    });
  });
};

// Display each post with like and comment functionality
const displayPost = (postId, post) => {
  const postElement = document.createElement("div");
  postElement.className = "instagram-post";
  postElement.innerHTML = `
    <div class="post-header">
      <div class="profile-picture">
        <img src="${post.authorPhoto}" alt="User profile picture">
      </div>
      <div class="profile-details">
        <div class="profile-name">
          ${post.authorName}
        </div>
        <div class="post-time">
          ${formatTimestamp(post.timestamp)}
        </div>
      </div>
    </div>
    <div class="post-image">
      <img src="${post.imageUrl}" alt="Post content">
    </div>
    <div class="like-counter">
      <span class="like-count">${Object.keys(post.likes || {}).length} likes</span>&nbsp;|&nbsp;<span>999k comments</span>
    </div>
    <div class="caption">
      <span class="username">${post.authorName}</span> ${post.content}
    </div>
    <div class="post-actions">
      <div class="actions-left">
        <i class="ri-heart-line like-btn" data-id="${postId}"></i>
        <i class="ri-notification-line"></i>
        <i class="ri-share-line"></i>
      </div>
      <div class="actions-right">
        <i class="ri-bookmark-line"></i>
      </div>
    </div>
    <div class="post-comments">
      <button class="toggle-comments" data-target="comments-container-${postId}">
        <i class="ri-arrow-down-s-line"></i> View Comments
      </button>
      <div class="comments-container" id="comments-container-${postId}">
        ${renderComments(post.comments)}
      </div>
      <div class="comment-input-container">
        <input class="comment-input" placeholder="Write a comment...">
        <button class="submit-comment" data-post-id="${postId}">Send</button>
      </div>
    </div>
  `;
  postsContainer.appendChild(postElement);

  // Like button functionality
  postElement.querySelector(".like-btn").addEventListener("click", () => likePost(postId, postElement));

  // Toggle comments visibility
  postElement.querySelector(".toggle-comments").addEventListener("click", () => {
    const commentsContainer = document.getElementById(postElement.querySelector(".toggle-comments").dataset.target);
    commentsContainer.style.display = commentsContainer.style.display === "none" ? "block" : "none";
  });

  // Handle comment submission
  postElement.querySelector(".submit-comment").addEventListener("click", (event) => {
    const postId = event.target.dataset.postId;
    const commentInput = postElement.querySelector(".comment-input");
    if (commentInput.value.trim() !== "") {
      submitComment(postId, commentInput.value.trim());
      commentInput.value = "";
    }
  });
};

// Like post functionality
const likePost = async (postId, postElement) => {
  const user = auth.currentUser;
  if (!user) return;

  const postLikesRef = ref(db, `posts/${postId}/likes/${user.uid}`);
  const postLikesSnapshot = await postLikesRef.get();
  if (postLikesSnapshot.exists()) {
    await update(postLikesRef, null); // Remove like
    postElement.querySelector(".like-count").innerText = `${Object.keys(post.likes || {}).length - 1} likes`;
  } else {
    await update(postLikesRef, true); // Add like
    postElement.querySelector(".like-count").innerText = `${Object.keys(post.likes || {}).length + 1} likes`;
  }
};

// Render comments for a post
const renderComments = (comments) => {
  if (!comments) return "";
  return Object.keys(comments).map((commentId) => {
    const comment = comments[commentId];
    return `
      <div class="comment">
        <span class="comment-username">${comment.username}</span><br><span class="comment-sms">${comment.message}</span>
      </div>
    `;
  }).join("");
};

// Submit a new comment for a post
const submitComment = async (postId, message) => {
  const user = auth.currentUser;
  if (!user) return;

  const commentId = push(ref(db, `posts/${postId}/comments`)).key;
  await set(ref(db, `posts/${postId}/comments/${commentId}`), {
    username: user.displayName || "Anonymous",
    message: message,
    timestamp: serverTimestamp(),
  });

  alert("Comment added!");
  loadPosts();  // Refresh posts to show the new comment
};

// Create a new post with caption and image
const createNewPost = async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Please log in to post.");
    return;
  }

  const caption = document.getElementById("new-post-caption").value;
  const fileInput = document.getElementById("new-post-image");
  const file = fileInput.files[0];

  if (!caption && !file) {
    alert("Please provide a caption or an image.");
    return;
  }

  try {
    let imageUrl = "";

    if (file) {
      // Upload image to Firebase Storage
      const storageReference = storageRef(storage, `post_images/${user.uid}/${file.name}`);
      const uploadTask = uploadBytes(storageReference, file);
      
      const snapshot = await uploadTask;
      imageUrl = await getDownloadURL(snapshot.ref);
    }

    // Save post to Firebase Realtime Database
    const newPostRef = push(ref(db, "posts"));
    await set(newPostRef, {
      authorName: user.displayName || "Anonymous",
      authorPhoto: user.photoURL || "default-profile.png",
      content: caption,
      imageUrl: imageUrl,
      timestamp: serverTimestamp(),
      likes: {},  // Initially, no likes
      comments: {},  // Initially, no comments
    });

    alert("Post created successfully!");
    document.getElementById("new-post-caption").value = "";
    fileInput.value = "";
    loadPosts();
  } catch (error) {
    console.error("Error creating post:", error);
    alert("Failed to create post.");
  }
};

// Event listener for creating a post
document.getElementById("create-post-btn").addEventListener("click", createNewPost);

// Monitor authentication state
onAuthStateChanged(auth, (user) => {
  if (user) {
    loadPosts();
  } else {
    alert("Please log in to view posts.");
  }
});</script>
</body>
</html>
