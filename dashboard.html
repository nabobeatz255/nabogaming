<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Like Post</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
      <script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_VKdV-KsIzUiOb7jFLsYXdTsuGkLiS-Q",
  authDomain: "register-71bde.firebaseapp.com",
  projectId: "register-71bde",
  storageBucket: "register-71bde.appspot.com",
  messagingSenderId: "412548441298",
  appId: "1:412548441298:web:e0fb2b6c5fbd4af7d0b90b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);
const storage = getStorage(app);

const postsContainer = document.getElementById("posts-container");
const createPostBtn = document.getElementById("create-post-btn");
const postContentInput = document.getElementById("post-content");
const postImageInput = document.getElementById("post-image");

// Function to create a post
const createPost = async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Please sign in to create a post.");
    return;
  }

  const content = postContentInput.value;
  const imageFile = postImageInput.files[0];
  let imageUrl = "";

  if (imageFile) {
    const storageRef = ref(storage, `post_images/${Date.now()}_${imageFile.name}`);
    const snapshot = await uploadBytes(storageRef, imageFile);
    imageUrl = await getDownloadURL(snapshot.ref);
  }

  await addDoc(collection(db, "posts"), {
    authorId: user.uid,
    content,
    imageUrl,
    timestamp: new Date(),
    likesCount: 0,
    commentsCount: 0,
    sharesCount: 0,
  });

  postContentInput.value = "";
  postImageInput.value = "";
  alert("Post created!");
};

// Function to load posts
const loadPosts = () => {
  const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  onSnapshot(postsQuery, (snapshot) => {
    postsContainer.innerHTML = "";
    snapshot.forEach((doc) => {
      const post = doc.data();
      displayPost(doc.id, post);
    });
  });
};

// Function to display a post
const displayPost = (postId, post) => {
  const postElement = document.createElement("div");
  postElement.className = "post";
  postElement.innerHTML = `
    <p>${post.content}</p>
    ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Post Image">` : ""}
    <div>
      <button class="like-btn" data-id="${postId}">Like (${post.likesCount})</button>
      <button class="comment-btn" data-id="${postId}">Comment</button>
      <button class="share-btn" data-id="${postId}">Share (${post.sharesCount})</button>
    </div>
    <div class="comments-container" id="comments-${postId}"></div>
  `;

  postsContainer.appendChild(postElement);

  // Like button functionality
  postElement.querySelector(".like-btn").addEventListener("click", () => likePost(postId));
  // Share button functionality
  postElement.querySelector(".share-btn").addEventListener("click", () => sharePost(postId));
};

// Function to like a post
const likePost = async (postId) => {
  const postRef = doc(db, "posts", postId);
  await updateDoc(postRef, { likesCount: increment(1) });
};

// Function to share a post
const sharePost = async (postId) => {
  const postRef = doc(db, "posts", postId);
  await updateDoc(postRef, { sharesCount: increment(1) });
};

// Event Listeners
createPostBtn.addEventListener("click", createPost);

// Monitor auth state and load posts
onAuthStateChanged(auth, (user) => {
  if (user) {
    loadPosts();
  } else {
    alert("Please log in to view posts.");
  }
});</script>
  <div id="app">
    <div id="create-post">
      <input type="text" id="post-content" placeholder="Write your post...">
      <input type="file" id="post-image">
      <button id="create-post-btn">Create Post</button>
    </div>

    <div id="posts-container"></div>
  </div>


</body>
</html>
