<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Like Post</title>
<style>
    body {
  font-family: Arial, sans-serif;
}

#app {
  width: 600px;
  margin: auto;
}

.post {
  border: 1px solid #ddd;
  padding: 10px;
  margin: 10px 0;
}

.post img {
  max-width: 100%;
  height: auto;
}

button {
  margin: 5px;
  padding: 5px 10px;
  cursor: pointer;
}

.comment-section {
  margin-top: 10px;
}

.comment {
  margin: 5px 0;
  padding-left: 10px;
  border-left: 2px solid #ddd;
}
</style>
</head>
<body>
  <div id="app">
    <div id="create-post">
      <input type="text" id="post-content" placeholder="Write your post...">
      <input type="file" id="post-image">
      <button id="create-post-btn">Create Post</button>
    </div>

    <div id="posts-container"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_VKdV-KsIzUiOb7jFLsYXdTsuGkLiS-Q",
    authDomain: "register-71bde.firebaseapp.com",
    projectId: "register-71bde",
    storageBucket: "register-71bde.appspot.com",
    messagingSenderId: "412548441298",
    appId: "1:412548441298:web:e0fb2b6c5fbd4af7d0b90b",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getDatabase(app);

  const postsContainer = document.getElementById("posts-container");

  // Load posts and display them
  const loadPosts = () => {
    const postsRef = ref(db, "posts");
    onValue(postsRef, (snapshot) => {
      postsContainer.innerHTML = "";
      snapshot.forEach((childSnapshot) => {
        const postId = childSnapshot.key;
        const post = childSnapshot.val();
        displayPost(postId, post);
      });
    });
  };

  // Display a single post
  const displayPost = (postId, post) => {
    const postElement = document.createElement("div");
    postElement.className = "post";

    // Get the current user's ID
    const user = auth.currentUser;
    const userId = user ? user.uid : null;

    const isLiked = post.likes && userId in post.likes;

    postElement.innerHTML = `
      <p>${post.content}</p>
      ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Post Image">` : ""}
      <div>
        <button class="like-btn" data-id="${postId}">
          ${isLiked ? "Unlike" : "Like"} (${Object.keys(post.likes || {}).length})
        </button>
      </div>
    `;

    postsContainer.appendChild(postElement);

    // Add event listener to the like button
    postElement.querySelector(".like-btn").addEventListener("click", () => toggleLike(postId));
  };

  // Toggle like functionality
  const toggleLike = async (postId) => {
    const user = auth.currentUser;
    if (!user) {
      alert("Please log in to like a post.");
      return;
    }

    const postLikesRef = ref(db, `posts/${postId}/likes/${user.uid}`);

    // Check if the user has already liked the post
    const likeSnapshot = await (await postLikesRef).get();
    if (likeSnapshot.exists()) {
      // If already liked, remove the like
      await set(postLikesRef, null);
    } else {
      // Otherwise, add the like
      await set(postLikesRef, true);
    }
  };

  // Monitor auth state
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loadPosts();
    } else {
      alert("Please log in to view posts.");
    }
  });
</script>
</body>
</html>
